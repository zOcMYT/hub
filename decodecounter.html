<!DOCTYPE html>
<head>
<style>
    body {
        background-color: #201c2b;
    }

    .redButtonFiredStyle {
    background-color: darkred;
    color: white;
    font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
    font-size: 5vw;
    display: flex;
    position: absolute;
    left: 5vw;
    bottom: 5vh;
    text-align: center;
    justify-content: center;
    align-items: center;
    border-color: white;
    border-width: 2vh;
    border-radius: 2vh;
    width: 40vw;
    height: 30vh;
    transition: background-color 0.5s, color 0.5s;
}
    .redButtonFiredStyle:hover {
        background-color: rgb(236, 183, 183);
        color: black;
}

    .blueButtonFiredStyle {
    background-color: darkblue;
    color: white;
    font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
    font-size: 5vw;
    display: flex;
    position: absolute;
    right: 5vw;
    bottom: 5vh;
    text-align: center;
    justify-content: center;
    align-items: center;
    border-color: white;
    border-width: 2vh;
    border-radius: 2vh;
    width: 40vw;
    height: 30vh;
    transition: background-color 0.5s, color 0.5s;
}
    .blueButtonFiredStyle:hover {
        background-color: rgb(180, 180, 247);
        color: black;
}

    .redButtonMadeStyle {
    background-color: red;
    color: white;
    font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
    font-size: 5vw;
    display: flex;
    position: absolute;
    left: 5vw;
    bottom: 45vh;
    text-align: center;
    justify-content: center;
    align-items: center;
    border-color: white;
    border-width: 2vh;
    border-radius: 2vh;
    width: 40vw;
    height: 30vh;
    transition: background-color 0.5s, color 0.5s;
}
    .redButtonMadeStyle:hover {
        background-color: rgb(236, 183, 183);
        color: black;
}

    .blueButtonMadeStyle {
    background-color: blue;
    color: white;
    font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
    font-size: 5vw;
    display: flex;
    position: absolute;
    right: 5vw;
    bottom: 45vh;
    text-align: center;
    justify-content: center;
    align-items: center;
    border-color: white;
    border-width: 2vh;
    border-radius: 2vh;
    width: 40vw;
    height: 30vh;
    transition: background-color 0.5s, color 0.5s;
}
    .blueButtonMadeStyle:hover {
        background-color: rgb(180, 180, 247);
        color: black;
}

    .calculateButtonStyle {
    background-color: green;
    color: white;
    font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
    font-size: 5vw;
    display: flex;
    position: absolute;
    margin: auto;
    left: 5vw;
    top: 5vh;
    text-align: center;
    justify-content: center;
    align-items: center;
    border-color: white;
    border-width: 2vh;
    border-radius: 2vh;
    width: 40vw;
    height: 15vh;
    transition: background-color 0.5s, color 0.5s;
}
    .calculateButtonStyle:hover {
        background-color: rgb(221, 250, 177);
        color: black;
}

    .resetButtonStyle {
    background-color: red;
    color: white;
    font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
    font-size: 5vw;
    display: flex;
    position: absolute;
    margin: auto;
    right: 5vw;
    top: 5vh;
    text-align: center;
    justify-content: center;
    align-items: center;
    border-color: white;
    border-width: 2vh;
    border-radius: 2vh;
    width: 40vw;
    height: 15vh;
    transition: background-color 0.5s, color 0.5s;
}
    .resetButtonStyle:hover {
        background-color: rgb(241, 192, 192);
        color: black;
}
</style>
</head>
<html>
    <!--Create the red fired button-->
    <button type="button" class="redButtonFiredStyle" onclick="redFiredCounter()" id="redTeamFiredButton"></button>

    <!--Create the blue fired button-->
    <button type="button" class="blueButtonFiredStyle" onclick="blueFiredCounter()" id="blueTeamFiredButton"></button>

    <!--Create the red  utton-->
    <button type="button" class="redButtonMadeStyle" onclick="redMadeCounter()" id="redTeamMadeButton"></button>

    <!--Create the blue button-->
    <button type="button" class="blueButtonMadeStyle" onclick="blueMadeCounter()" id="blueTeamMadeButton"></button>

    <!--Create the calculate button-->
    <button type="button" class="calculateButtonStyle" onclick="calculate()" id="calcButton">Calculate</button>

    <!--Create the reset button-->
    <button type="button" class="resetButtonStyle" onclick="reset()" id="resetButton">Reset</button>

    <script>
        var redFired = 0;
        var blueFired = 0;

        var redMade = 0;
        var blueMade = 0;

        document.getElementById("redTeamFiredButton").textContent = redFired;

        document.getElementById("blueTeamFiredButton").textContent = blueFired;

        document.getElementById("redTeamMadeButton").textContent = redMade;

        document.getElementById("blueTeamMadeButton").textContent = blueMade;

        function redFiredCounter() {
            redFired += 1;
            document.getElementById("redTeamFiredButton").textContent = redFired;
        }

        function blueFiredCounter() {
            blueFired += 1;
            document.getElementById("blueTeamFiredButton").textContent = blueFired;
        }

        function redMadeCounter() {
            redMade += 1;
            redFired += 1;
            document.getElementById("redTeamMadeButton").textContent = redMade;
            document.getElementById("redTeamFiredButton").textContent = redFired;
        }

        function blueMadeCounter() {
            blueMade += 1;
            blueFired += 1;
            document.getElementById("blueTeamMadeButton").textContent = blueMade;
            document.getElementById("blueTeamFiredButton").textContent = blueFired;
        }

        function calculate() {
            let redAcc = Math.round(redMade / redFired * 100) + "%";
            let blueAcc = Math.round(blueMade / blueFired * 100) + "%";

            alert('Red Team Accuracy: ' + redAcc + '\n' + 'Blue Team Accuracy: ' + blueAcc);
        }

        function reset() {
            if(confirm("Are you sure you want to reset?")) {
                redFired = 0;
                redMade = 0;

                blueFired = 0;
                blueMade = 0;

                document.getElementById("redTeamFiredButton").textContent = redFired;
                document.getElementById("blueTeamFiredButton").textContent = blueFired;
                document.getElementById("redTeamMadeButton").textContent = redMade;
                document.getElementById("blueTeamMadeButton").textContent = blueMade;
            }
        }
    </script>
</html>
